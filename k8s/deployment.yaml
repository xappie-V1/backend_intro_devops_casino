apiVersion: apps/v1
kind: Deployment
metadata:
  name: casino-backend
  labels:
    app: casino-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: casino-backend
  template:
    metadata:
      labels:
        app: casino-backend
    spec:
      containers:
        - name: casino-backend
          image: 533267092848.dkr.ecr.us-east-1.amazonaws.com/casino-backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: casino-config

            - secretRef:
                name: casino-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
